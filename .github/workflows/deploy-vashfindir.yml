name: Deploy vashfindir to production

on:
  workflow_run:
    workflows: ["Site CI/CD"]
    types:
      - completed
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH to vashfindir server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            COMPOSE_FILE="${DEPLOY_PATH}/docker-compose.prod.yml"

            echo "==> cd ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            sudo /usr/local/sbin/vashfindir-fix-wp-perms || true
            echo "==> git sync (hard reset to origin/master)"
            git fetch --all --prune
            # Если у тебя основная ветка main, поменяй origin/master на origin/main
            git reset --hard origin/master
            git clean -fd

            echo "==> export secrets (from GitHub Secrets)"
            export VF_DB_PASSWORD='${{ secrets.VF_DB_PASSWORD }}'
            export VF_DB_ROOT_PASSWORD='${{ secrets.VF_DB_ROOT_PASSWORD }}'
            export VF_SITE_APP_SECRET='${{ secrets.VF_SITE_APP_SECRET }}'
            export GHCR_OWNER='${{ github.repository_owner }}'
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}'
            if [ '${{ github.event_name }}' = 'workflow_run' ]; then
              export IMAGE_TAG='sha-${{ github.event.workflow_run.head_sha }}'
            else
              export IMAGE_TAG='latest'
            fi

            if [ -z "${GHCR_OWNER}" ]; then
              echo "ERROR: GHCR_OWNER is empty"
              exit 1
            fi

            if [ -z "${GHCR_TOKEN}" ]; then
              echo "ERROR: GHCR_TOKEN is empty"
              exit 1
            fi

            echo "==> docker login to GHCR"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_OWNER}" --password-stdin

            echo "==> sanity: render docker-compose config"
            docker-compose -f "${COMPOSE_FILE}" config > /tmp/vashfindir.compose.rendered.yml

            echo "==> services in rendered compose"
            docker-compose -f "${COMPOSE_FILE}" config --services

            echo "==> stop Symfony services (ignore errors)"
            docker-compose -f "${COMPOSE_FILE}" stop site site-php-fpm 2>/dev/null || true

            echo "==> pull Symfony images"
            docker-compose -f "${COMPOSE_FILE}" pull site-php-fpm site-php-cli

            echo "==> start Symfony services"
            docker-compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate site-php-fpm
            docker-compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate site

            echo "==> status (Symfony services)"
            docker-compose -f "${COMPOSE_FILE}" ps site site-php-fpm

            echo "==> logs: site (tail)"
            docker-compose -f "${COMPOSE_FILE}" logs --tail=120 site || true

            echo "==> logs: site-php-fpm (tail)"
            docker-compose -f "${COMPOSE_FILE}" logs --tail=120 site-php-fpm || true

            echo "==> health check (Symfony)"
            curl -fsS https://newversion.vashfindir.ru/health

            echo "==> health check (WordPress HTTP only)"
            curl -I https://vashfindir.ru/ || true
