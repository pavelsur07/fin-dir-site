name: Deploy vashfindir to production

on:
    push:
        branches: ["master", "main"]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_PHP_FPM: ${{ github.repository_owner }}/vashfindir-site-php-fpm
    IMAGE_PHP_CLI: ${{ github.repository_owner }}/vashfindir-site-php-cli
    IMAGE_TAG: sha-${{ github.sha }}

jobs:
    deploy:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  tools: composer:v2
                  extensions: pdo_pgsql, pgsql, zip, bcmath
                  coverage: none

            - name: Composer validate
              working-directory: site
              run: composer validate --strict --no-check-lock

            - name: Composer install
              working-directory: site
              run: composer install --no-dev --prefer-dist --no-interaction --no-progress --no-scripts

            - name: Lint Twig templates
              working-directory: site
              run: php bin/console lint:twig templates

            - name: Lint Symfony container
              working-directory: site
              run: php bin/console lint:container

            - name: Login to GHCR
              run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            - name: Build PHP-FPM image
              run: |
                  docker build \
                    -f site/docker/production/php-fpm/Dockerfile \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_FPM }}:latest \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_FPM }}:${{ env.IMAGE_TAG }} \
                    site

            - name: Push PHP-FPM image
              run: |
                  docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_FPM }}:latest
                  docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_FPM }}:${{ env.IMAGE_TAG }}

            - name: Build PHP-CLI image
              run: |
                  docker build \
                    -f site/docker/production/php-cli/Dockerfile \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_CLI }}:latest \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_CLI }}:${{ env.IMAGE_TAG }} \
                    site

            - name: Push PHP-CLI image
              run: |
                  docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_CLI }}:latest
                  docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_CLI }}:${{ env.IMAGE_TAG }}

            - name: Deploy Symfony over SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      set -euo pipefail
                      
                      DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
                      COMPOSE_FILE="${DEPLOY_PATH}/docker-compose.prod.yml"
                      
                      echo "==> cd ${DEPLOY_PATH}"
                      cd "${DEPLOY_PATH}"
                      
                      echo "==> git sync"
                      git fetch --all --prune
                      git reset --hard origin/${{ github.ref_name }}
                      git clean -fd
                      
                      echo "==> export env"
                      export VF_DB_PASSWORD='${{ secrets.VF_DB_PASSWORD }}'
                      export VF_DB_ROOT_PASSWORD='${{ secrets.VF_DB_ROOT_PASSWORD }}'
                      export VF_SITE_APP_SECRET='${{ secrets.VF_SITE_APP_SECRET }}'
                      export GHCR_OWNER='${{ github.repository_owner }}'
                      export IMAGE_TAG='${{ env.IMAGE_TAG }}'
                      
                      echo "==> docker login to GHCR"
                      echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin
                      
                      echo "==> render compose config"
                      docker-compose -f "${COMPOSE_FILE}" config > /tmp/vashfindir.compose.rendered.yml
                      
                      echo "==> pull Symfony images"
                      docker-compose -f "${COMPOSE_FILE}" pull site-php-fpm site-php-cli
                      
                      echo "==> stop Symfony services"
                      docker-compose -f "${COMPOSE_FILE}" stop site site-php-fpm 2>/dev/null || true
                      
                      echo "==> start Symfony FPM"
                      docker-compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate site-php-fpm
                      
                      echo "==> start Symfony Nginx"
                      docker-compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate site
                      
                      echo "==> status"
                      docker-compose -f "${COMPOSE_FILE}" ps site site-php-fpm
                      
                      echo "==> Symfony health"
                      curl -fsS https://newversion.vashfindir.ru/health
                      
                      echo "==> WordPress HTTP check only"
                      curl -I https://vashfindir.ru/ || true