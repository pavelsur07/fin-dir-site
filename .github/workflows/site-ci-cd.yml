name: Site CI/CD

on:
  push:
    branches: ["master", "main"]
    paths:
      - "site/**"
      - ".github/workflows/site-ci-cd.yml"
      - "docker-compose.prod.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-ci-cd.yml"
      - "docker-compose.prod.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PHP_FPM: ${{ github.repository_owner }}/vashfindir-site-php-fpm
  IMAGE_PHP_CLI: ${{ github.repository_owner }}/vashfindir-site-php-cli

jobs:
  symfony-checks:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: ci-secret
      DEFAULT_URI: https://example.test
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure composer.lock exists
        run: |
          test -f composer.lock || (echo "ERROR: site/composer.lock is required" >&2; exit 1)

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Composer validate
        run: composer validate --strict --no-check-lock

      - name: Composer install (prod)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Lint Twig templates
        run: php bin/console lint:twig templates

      - name: Lint Symfony container
        run: php bin/console lint:container

  build-and-push-site-images:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: symfony-checks
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (php-fpm)
        id: meta-php-fpm
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_FPM }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build and push php-fpm image
        uses: docker/build-push-action@v6
        with:
          context: ./site
          file: ./site/docker/production/php-fpm/Dockerfile
          push: true
          tags: ${{ steps.meta-php-fpm.outputs.tags }}
          labels: ${{ steps.meta-php-fpm.outputs.labels }}

      - name: Extract Docker metadata (php-cli)
        id: meta-php-cli
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PHP_CLI }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build and push php-cli image
        uses: docker/build-push-action@v6
        with:
          context: ./site
          file: ./site/docker/production/php-cli/Dockerfile
          push: true
          tags: ${{ steps.meta-php-cli.outputs.tags }}
          labels: ${{ steps.meta-php-cli.outputs.labels }}
